name: 3D City Builder

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D City
    permissions:
      contents: write

    steps:
      - name: Generate 3D Contribution City
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: profile-3d-city.svg

          # 🔹 Minimal base (no clutter)
          base: ""

          # 🔹 Core plugin (city grid)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_isocalendar_mode: compact

          # 🔹 Layout & spacing
          config_display: large
          config_padding: 0

          # 🔹 Theme (matches your README neon-dark vibe)
          config_colors: |
            background: #0f2027
            text: #ffffff
            primary: #00E6FF
            secondary: #a371f7

          # 🔹 Accuracy
          config_timezone: Asia/Kolkata

          # 🔹 Output
          config_output: svg
          config_order: isocalendar
