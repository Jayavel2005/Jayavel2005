name: 3D City Builder

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D City
    permissions:
      contents: write

    steps:
      - name: Generate 3D Contribution City
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: profile-3d-city.svg

          # ✅ Minimal base
          base: ""

          # ✅ Only valid plugin options
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ✅ Layout (supported)
          config_display: large
          config_padding: 0
          config_timezone: Asia/Kolkata

          # ✅ Output
          config_output: svg
          config_order: isocalendar
